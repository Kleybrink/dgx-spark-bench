# ==========================================================================

judge_model: "qwen3.5:35b"
judge_temperature: 0.1
judge_think: false

ollama_base_url: "http://localhost:11434"  # overridden by OLLAMA_HOST env var if set
runs_per_mode: 2
keep_alive: "10m"
timeout_s: 300
warmup_timeout_s: 600
vram_settle_s: 30
vram_free_target: 0.70